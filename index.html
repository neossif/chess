<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliver vs JD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="intro-screen" id="intro-screen">
        <div class="intro-card">
            <div class="intro-badge">ANIME BATTLE</div>
            <h1>Oliver vs JD</h1>
            <p>Una batalla épica de ajedrez para los mares del Grand Line.</p>
            <div class="intro-tags">
                <span>Oliver</span>
                <span>VS</span>
                <span>JD</span>
            </div>
            <button class="btn btn-primary intro-btn" id="start-game-btn">Comenzar batalla</button>
        </div>
    </div>

    <div class="container">
        <h1 class="title">Oliver vs JD</h1>
        
        <div class="game-area">
            <div class="player-info" id="black-info">
                <div class="avatar zoro-avatar">
                    <img src="zoro.jpg" alt="Zoro">
                </div>
                <div class="player-details">
                    <span class="player-name">JD</span>
                    <span class="captured-pieces" id="black-captured"></span>
                </div>
            </div>

            <div class="board-container">
                <div class="board-labels-top"></div>
                <div class="board-wrapper">
                    <div class="rank-labels" id="rank-labels"></div>
                    <div class="board" id="board"></div>
                </div>
                <div class="file-labels" id="file-labels"></div>
            </div>

            <div class="player-info active-player" id="white-info">
                <div class="avatar luffy-avatar">
                    <img src="luffy.jpg" alt="Luffy">
                </div>
                <div class="player-details">
                    <span class="player-name">Oliver</span>
                    <span class="captured-pieces" id="white-captured"></span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="new-game-btn">Nueva Partida</button>
            <button class="btn btn-secondary" id="undo-btn">↩️ Deshacer</button>
            <button class="btn btn-accent" id="hint-btn">🗺️ Pista</button>
            <button class="btn btn-music" id="music-btn">🎵 Música</button>
        </div>

        <div class="status-bar" id="status">Turno de Oliver</div>
    </div>

    <div class="modal hidden" id="modal">
        <div class="modal-content wanted-poster">
            <div class="wanted-header">WANTED</div>
            <div class="modal-icon" id="modal-icon">🏆</div>
            <h2 class="modal-title" id="modal-title">¡Victoria!</h2>
            <p class="modal-message" id="modal-message"></p>
            <div class="bounty-text" id="bounty-text"></div>
            <button class="btn btn-primary" id="modal-btn">Jugar de Nuevo</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
